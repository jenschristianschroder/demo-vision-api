name: Deploy Vision API Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: vision-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          for secret in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_RESOURCE_GROUP AZURE_VISION_ENDPOINT; do
            if [ -z "${!secret}" ]; then
              echo "::error::Required secret $secret is not set"
              exit 1
            fi
          done
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_VISION_ENDPOINT: ${{ secrets.AZURE_VISION_ENDPOINT }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Resource Group
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location ${{ vars.AZURE_LOCATION || 'eastus2' }} \
            --output none 2>/dev/null || true

      - name: Deploy Bicep Infrastructure
        id: bicep
        run: |
          RESULT=$(az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters \
              appName=${{ env.APP_NAME }} \
              visionEndpoint=${{ secrets.AZURE_VISION_ENDPOINT }} \
              visionResourceId="${{ secrets.AZURE_VISION_RESOURCE_ID }}" \
            --query 'properties.outputs' \
            --output json 2>&1) || true

          # Handle MANIFEST_UNKNOWN on first deploy
          if echo "$RESULT" | grep -q "MANIFEST_UNKNOWN"; then
            echo "::warning::First deploy — placeholder images not yet pushed. Continuing..."
          fi

          ACR_SERVER=$(echo "$RESULT" | jq -r '.acrLoginServer.value // empty' 2>/dev/null || true)
          API_APP=$(echo "$RESULT" | jq -r '.apiAppName.value // empty' 2>/dev/null || true)
          SPA_APP=$(echo "$RESULT" | jq -r '.spaAppName.value // empty' 2>/dev/null || true)

          if [ -z "$ACR_SERVER" ]; then
            ACR_SERVER=$(az acr list --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query '[0].loginServer' -o tsv)
          fi

          echo "acr_server=$ACR_SERVER" >> $GITHUB_OUTPUT
          echo "api_app=${API_APP:-${{ env.APP_NAME }}-api}" >> $GITHUB_OUTPUT
          echo "spa_app=${SPA_APP:-${{ env.APP_NAME }}-spa}" >> $GITHUB_OUTPUT

      - name: ACR Login
        run: az acr login --name $(echo ${{ steps.bicep.outputs.acr_server }} | cut -d. -f1)

      - name: Build & Push API Image
        run: |
          IMAGE=${{ steps.bicep.outputs.acr_server }}/${{ env.APP_NAME }}-api:${{ github.sha }}
          docker build -t $IMAGE ./services/api
          docker push $IMAGE
          echo "api_image=$IMAGE" >> $GITHUB_ENV

      - name: Build & Push SPA Image
        run: |
          IMAGE=${{ steps.bicep.outputs.acr_server }}/${{ env.APP_NAME }}-spa:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "spa_image=$IMAGE" >> $GITHUB_ENV

      - name: Update API Container App
        run: |
          az containerapp update \
            --name ${{ steps.bicep.outputs.api_app }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.api_image }} \
            --min-replicas 1

      - name: Update SPA Container App
        run: |
          az containerapp update \
            --name ${{ steps.bicep.outputs.spa_app }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.spa_image }} \
            --min-replicas 1

      - name: Output SPA URL
        run: |
          URL=$(az containerapp show \
            --name ${{ steps.bicep.outputs.spa_app }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "::notice::SPA deployed to https://$URL"
